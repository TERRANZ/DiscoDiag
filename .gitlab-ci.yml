image: 192.168.3.1:5000/vterranz/discobuild

before_script:
  - export DOCKER_HOST=http://192.168.1.3:2375
  - export http_proxy=socks5h://192.168.3.1:10001
  - export https_proxy=socks5h://192.168.3.1:10001

stages:
  - build
  - pr_agent

build:
  stage: build
  script:
    - mkdir build && cd build && cmake .. && make -j
  artifacts:
    paths:
      - build/DiscoDiag
pr_agent_job:
  stage: pr_agent
  image:
    name: pragent/pr-agent:latest
    entrypoint: [""]
  script:
    - echo "Running PR Agent action step"
    - export MR_URL="$CI_MERGE_REQUEST_PROJECT_URL/merge_requests/$CI_MERGE_REQUEST_IID"
    - echo "MR_URL=$MR_URL"
    - export gitlab__url=$CI_SERVER_PROTOCOL://$CI_SERVER_FQDN
    - export gitlab__PERSONAL_ACCESS_TOKEN=$GITLAB_PERSONAL_ACCESS_TOKEN
    - export config__git_provider="gitlab"
    - export openai__key=test
    - export OPENAI__API_BASE=http://192.168.3.1:11434/v1
    - python -m pr_agent.cli --pr_url="$MR_URL" describe
    - python -m pr_agent.cli --pr_url="$MR_URL" review
    - python -m pr_agent.cli --pr_url="$MR_URL" improve
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'      